
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GB BARAKA Super Kalkulyator</title>
<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff}
.wrap{max-width:540px;margin:auto;padding:14px;background:linear-gradient(#101010,#050505)}
.title{text-align:center;color:#f5c55c;font-size:34px;font-weight:900}
.sub{text-align:center;margin-bottom:14px}
.box{border:1px solid #b8892f;border-radius:18px;padding:14px;margin-top:14px;background:#0d0d0d}
h2{margin:0 0 12px;color:#f5c55c}
label{display:block;margin-top:10px;font-weight:bold;color:#f5c55c}
input,select{width:100%;padding:14px;border-radius:12px;border:1px solid #b8892f;background:#111;color:#fff;font-size:18px;font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.result{margin-top:14px;border:1px solid #b8892f;border-radius:14px;padding:14px;background:#131313}
.big{font-size:28px;color:#65e06f;font-weight:900}
.small{font-size:14px;color:#ddd}
button{width:100%;padding:14px;border-radius:12px;border:0;background:linear-gradient(#f6d06a,#bb8120);font-size:18px;font-weight:900;margin-top:12px;color:#fff}
</style>
</head>
<body>
<div class="wrap">
<div class="title">GB BARAKA</div>
<div class="sub">POLIETILEN PLYONKA SUPER KALKULYATORI</div>

<div class="box">
<h2>1️⃣ KG → METR HISOBI</h2>

<div class="grid">
<div>
<label>Eni</label>
<select id="width"></select>
</div>
<div>
<label>Qalinligi</label>
<select id="micron"></select>
</div>
</div>

<label>Og‘irligi (kg)</label>
<input id="kg" type="number" value="10" oninput="calc1()">

<label>1 kg narxi</label>
<input id="price" type="number" value="20000" oninput="calc1()">

<div class="result">
<div>1 kg dan chiqadi:</div>
<div class="big" id="perkg">0</div>
<div class="small">metr</div>

<div style="margin-top:10px">Jami uzunlik:</div>
<div class="big" id="totalm">0</div>
<div class="small">metr</div>

<div style="margin-top:10px">1 metr narxi:</div>
<div class="big" id="metrnarx">0</div>
<div class="small">so‘m</div>
</div>
</div>

<div class="box">
<h2>2️⃣ KVADRAT METR BUYURTMA HISOBI</h2>

<label>Kerakli kvadrat metr</label>
<input id="m2" type="number" value="500" oninput="calc2()">

<label>1 kg plyonka narxi</label>
<input id="price2" type="number" value="20000" oninput="calc2()">

<div class="result">
<div>Kerak bo‘ladigan og‘irlik:</div>
<div class="big" id="needkg">0</div>
<div class="small">kg</div>

<div style="margin-top:10px">Chiqadigan uzunlik:</div>
<div class="big" id="needm">0</div>
<div class="small">metr</div>

<div style="margin-top:10px">Jami summa:</div>
<div class="big" id="totalsum">0</div>
<div class="small">so‘m</div>
</div>

<button onclick="sendOrder()">📦 BUYURTMA BERISH</button>
</div>
</div>

<script>
const width=document.getElementById("width");
for(let i=1;i<=16;i+=0.5){
 let o=document.createElement("option");
 o.value=i;
 o.text=(Number.isInteger(i)?i:i.toFixed(1).replace(".",","))+" metr";
 if(i===4)o.selected=true;
 width.appendChild(o);
}

const micron=document.getElementById("micron");
for(let i=10;i<=120;i+=10){
 let o=document.createElement("option");
 o.value=i;
 o.text=i+" mikron";
 if(i===50)o.selected=true;
 micron.appendChild(o);
}

function fmt(x){
 return Math.round(x).toLocaleString("ru-RU").replace(/,/g," ");
}

function calc1(){
 const w=parseFloat(width.value);
 const m=parseFloat(micron.value);
 const kg=parseFloat(document.getElementById("kg").value||0);
 const price=parseFloat(document.getElementById("price").value||0);

 const coef=960;
 const perkg=coef/(w*m);
 const totalm=perkg*kg;
 const metrnarx=price/perkg;

 document.getElementById("perkg").innerText=perkg.toFixed(2);
 document.getElementById("totalm").innerText=totalm.toFixed(2);
 document.getElementById("metrnarx").innerText=fmt(metrnarx);

 calc2();
}

function calc2(){
 const w=parseFloat(width.value);
 const m=parseFloat(micron.value);
 const m2=parseFloat(document.getElementById("m2").value||0);
 const price2=parseFloat(document.getElementById("price2").value||0);

 const coef=960;
 const perkg=coef/(w*m);

 const neededLength=m2/w;
 const neededKg=neededLength/perkg;
 const total=neededKg*price2;

 document.getElementById("needkg").innerText=neededKg.toFixed(2);
 document.getElementById("needm").innerText=neededLength.toFixed(2);
 document.getElementById("totalsum").innerText=fmt(total);
}

function sendOrder(){
 alert("Buyurtma yuborildi!");
}

width.onchange=()=>{calc1();calc2();}
micron.onchange=()=>{calc1();calc2();}

calc1();
calc2();
</script>
</body>
</html>
